{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block body_block %}

<div style="max-width:360px; margin:0 auto;">
<div class="card">
    <h2 style="margin-bottom:6px;">Login</h2>
    <p style="color:#888; font-size:0.875rem; margin-bottom:16px;">Welcome back!</p>

    {% if form.errors %}
    <p style="background:#f8d7da; color:#842029; padding:8px 12px; border-radius:4px; font-size:0.875rem;">
        Invalid username or password.
    </p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <label>Username</label>
        <input type="text" name="username" placeholder="your_username" required>
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:16px;">Login</button>
    </form>

    <p style="text-align:center; margin-top:14px; font-size:0.875rem; color:#888;">
        No account? <a href="{% url 'flavourindexApp:register' %}">Register here</a>
    </p>
</div>
</div>

{% endblock %}

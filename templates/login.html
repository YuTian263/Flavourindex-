{% extends 'base.html' %}
{% load static %}

{% block title %}Login{% endblock %}

{% block template_css %}
<link rel="stylesheet" href = "{% static 'css/login.css' %}">
{% endblock %}

{% block body_block %}

<div class="loginBox">
<div class="card">
    <h2 class="title">Login</h2>
    <p class="welcomeBack">Welcome back!</p>

    {% if form.errors %}
    <p class="errorMessage">
        Invalid username or password.
    </p>
    {% endif %}

   <form method="post" id="login-form">
        {% csrf_token %}

        <label>Username</label>
        <input type="text" name="username" placeholder="your_username" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>

        <button type="submit" id="login-button" class="btn btn-primary loginButton">
            Login
        </button>
    </form>

    <script>
    document.getElementById("login-form").addEventListener("submit", function () {
        const btn = document.getElementById("login-button");
        btn.disabled = true;
        btn.textContent = "Logging in...";
    });
    </script>

    <p class="registerLink">
        No account? <a href="{% url 'flavourindexApp:register' %}">Register here</a>
    </p>
</div>
</div>

{% endblock %}

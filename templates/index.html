{% extends 'base.html' %}

{% block title %}Home{% endblock %}

{% block body_block %}

<h2>All Recipes</h2>
<p style="color:#888; margin-bottom:20px;">
    Browse recipes from the community. Login to add your own!
</p>

{% if user.is_authenticated %}
<a href="{% url 'add_recipe' %}" class="btn btn-primary" style="margin-bottom:24px;">+ Add a Recipe</a>
{% endif %}

<div style="position:relative; margin-bottom:30px;">

    <!-- Scrollable container -->
    <div class="recipe-scroll-wrapper" style="overflow-x:auto; scroll-behavior:smooth; padding-bottom:10px;">
        <div class="recipe-scroll" style="display:flex; gap:16px;">
            <!-- Recipes will be loaded via API -->
        </div>
    </div>

    <!-- Scroll buttons -->
    <button class="scroll-btn left" onclick="scrollLeft()" style="position:absolute; top:50%; left:0; transform:translateY(-50%); background:rgba(255,255,255,0.8); border:none; font-size:1.5rem; padding:6px 10px; cursor:pointer;">‹</button>
    <button class="scroll-btn right" onclick="scrollRight()" style="position:absolute; top:50%; right:0; transform:translateY(-50%); background:rgba(255,255,255,0.8); border:none; font-size:1.5rem; padding:6px 10px; cursor:pointer;">›</button>

</div>






<script>
// Scroll buttons
const scrollContainer = document.querySelector('.recipe-scroll');

function scrollLeft() {
    scrollContainer.scrollBy({ left: -300, behavior: 'smooth' });
}

function scrollRight() {
    scrollContainer.scrollBy({ left: 300, behavior: 'smooth' });
}

// Load recipes from API
async function loadRecipes() {
    try {
        const response = await fetch("{% url 'recipe_list_api' %}");
        const recipes = await response.json();

        const container = document.querySelector('.recipe-scroll');
        container.innerHTML = ''; // clear existing

        recipes.forEach(recipe => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.minWidth = '260px';
            card.style.flex = '0 0 auto';
            card.style.border = '1px solid #eee';
            card.style.borderRadius = '6px';
            card.style.padding = '12px';
            card.style.background = '#fff';
            card.innerHTML = `
                ${recipe.image ? `<img src="${recipe.image}" style="width:100%;height:150px;object-fit:cover;border-radius:4px;margin-bottom:12px;">` : ''}
                <h4 style="margin-bottom:6px;">${recipe.title}</h4>
                <p style="font-size:0.85rem;color:#666;margin-bottom:10px;">${recipe.description}</p>
                ${recipe.category ? `<span style="font-size:0.75rem;background:#eee;padding:2px 8px;border-radius:20px;color:#555;">${recipe.category}</span>` : ''}
                <div style="margin-top:14px; display:flex; justify-content:space-between; align-items:center;">
                    <small style="color:#aaa;">By ${recipe.author}</small>
                    <a href="/recipe/${recipe.id}/" class="btn btn-primary" style="padding:5px 12px; font-size:0.8rem;">View</a>
                </div>
            `;
            container.appendChild(card);
        });
    } catch (error) {
        console.error('Failed to load recipes:', error);
    }
}

// Run on page load
document.addEventListener('DOMContentLoaded', loadRecipes);
</script>

{% endblock %}

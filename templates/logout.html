{% extends 'base.html' %}

{% block title %}Logged Out{% endblock %}

{% block body_block %}

<div style="max-width:360px; margin:0 auto;">
<div class="card">
    <h2 style="margin-bottom:6px;">You've been logged out</h2>
    <p style="color:#888; font-size:0.875rem; margin-bottom:20px;">Thanks for visiting FlavourIndex!</p>

    <div style="display:flex; gap:10px;">
        <a href="{% url 'flavourindexApp:login' %}" class="btn btn-primary">Login again</a>
        <a href="{% url 'flavourindexApp:index' %}" class="btn btn-secondary">Browse Recipes</a>
    </div>
</div>
</div>

{% endblock %}
